# See:
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#creating-a-custom-github-actions-workflow-to-publish-your-site
# https://github.com/actions/upload-pages-artifact
# https://github.com/actions/configure-pages
# https://github.com/actions/deploy-pages

name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
      - shell: bash
        run: |
          uv sync --locked --only-group docs
          uv run --no-sync zensical build
      # Note that in v4, dot files are excluded, with no way to override.
      # This is apparently by design.
      # https://github.com/actions/upload-pages-artifact/issues/129
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - uses: actions/deploy-pages@v4
